<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1c2230"/>
      <stop offset="55%" stop-color="#12151d"/>
      <stop offset="100%" stop-color="#0c0e13"/>
    </radialGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff8e53"/>
    </linearGradient>
    <linearGradient id="plateL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8a7a"/>
      <stop offset="100%" stop-color="#e84f4f"/>
    </linearGradient>
    <linearGradient id="plateR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffab6e"/>
      <stop offset="100%" stop-color="#f3722c"/>
    </linearGradient>
  </defs>

  <!-- background: app dark theme with a soft glow behind the dumbbell -->
  <rect width="1024" height="1024" fill="url(#bgGlow)"/>
  <circle cx="512" cy="512" r="360" fill="#ff6b6b" opacity="0.07"/>

  <!-- dumbbell, tilted like it's mid-lift -->
  <g transform="rotate(-28 512 512)">
    <!-- bar -->
    <rect x="252" y="482" width="520" height="60" rx="30" fill="url(#bar)"/>

    <!-- inner plates -->
    <rect x="298" y="372" width="88" height="280" rx="40" fill="url(#plateL)"/>
    <rect x="638" y="372" width="88" height="280" rx="40" fill="url(#plateR)"/>

    <!-- outer plates -->
    <rect x="196" y="412" width="76" height="200" rx="36" fill="url(#plateL)"/>
    <rect x="752" y="412" width="76" height="200" rx="36" fill="url(#plateR)"/>

    <!-- subtle highlights -->
    <rect x="312" y="388" width="60" height="18" rx="9" fill="#ffffff" opacity="0.28"/>
    <rect x="652" y="388" width="60" height="18" rx="9" fill="#ffffff" opacity="0.28"/>
    <rect x="270" y="492" width="484" height="14" rx="7" fill="#ffffff" opacity="0.22"/>
  </g>
</svg>
